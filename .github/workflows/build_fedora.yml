name: CI (Fedora)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Prepare
        run: |
          dnf -y upgrade
          dnf -y install \
            git meson ninja-build rust cargo clang glslang libcap-devel \
            wlroots-devel SDL2-devel vulkan-headers libX11 libX11-devel libX11-common libxcb libxcb-devel libXcursor-devel libXmu-devel \
            libXcomposite-devel libXrender-devel libXres-devel \
            libXtst-devel libxkbcommon-devel libdrm-devel libinput-devel \
            wayland-protocols-devel \
            xorg-x11-server-Xwayland pipewire-devel cmake \
            libavif-devel libheif-devel rav1e-devel libdecor-devel libXxf86vm-devel hwdata-devel \
            libXdamage-devel xorg-x11-server-Xwayland-devel luajit-devel gcc gcc-c++ make google-benchmark-devel openssl openssl-devel libarchive libarchive-devel p7zip-plugins curl \

      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build partydeck
        run: cargo build --release -F build_gamescope -F download_deps

      - name: Assemble output
        run: |
          mkdir -p partydeck

          cp target/release/partydeck partydeck/partydeck

          cp -r target/release/res partydeck/res
          cp -r target/release/bin partydeck/bin

          cp res/GamingModeLauncher.sh partydeck/GamingModeLauncher.sh
          cp LICENSE partydeck/LICENSE
          cp COPYING.md partydeck/thirdparty.txt

      - name: Create tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          tar -czf "partydeck-FEDORA-TEST-linux-x86_64.tar.gz" partydeck/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: built-binaries
          path: |
            partydeck-FEDORA-TEST-linux-x86_64.tar.gz